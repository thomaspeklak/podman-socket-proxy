name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: psp
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: psp

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --package podman-socket-proxy --bin psp --target ${{ matrix.target }}

      - name: Sign macOS binary (ad-hoc)
        if: runner.os == 'macOS'
        run: codesign --sign - --force --timestamp target/${{ matrix.target }}/release/${{ matrix.artifact }}

      - name: Package artifact
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.artifact }} dist/psp-${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: psp-${{ matrix.target }}
          path: dist/psp-${{ matrix.target }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: CHANGELOG.md
          sparse-checkout-cone-mode: false

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Extract release notes from CHANGELOG
        id: notes
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -f CHANGELOG.md ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          TAG="${GITHUB_REF_NAME#v}"

          awk "/^## \[v${TAG}\]|^## \[${TAG}\]/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md > release-notes.txt

          if [ -s release-notes.txt ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release (with changelog notes)
        if: steps.notes.outputs.found == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          body_path: release-notes.txt
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release (auto notes)
        if: steps.notes.outputs.found != 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}
